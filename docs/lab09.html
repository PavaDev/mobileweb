<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 - My Mobile Web</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Prompt:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Prompt', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .student-info {
            font-size: 1.25rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        section {
            margin-bottom: 4rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding-left: 1rem;
            border-left: 4px solid var(--primary);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            display: block;
            background: rgba(0, 0, 0, 0.2);
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 1rem;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>นายปวริศ กุลแก้ว</h1>
            <p class="student-info">รหัสนักศึกษา: 663380019-2</p>
        </header>

        <section>
            <h2>ผลงานโครงการ</h2>
            <div class="gallery">
                <div class="gallery-item">
                    <img src="img7.png" alt="Workspace">
                </div>
                <div class="gallery-item">
                    <img src="img8.png" alt="Futuristic City">
                </div>
                <div class="gallery-item">
                    <img src="img9.png" alt="High-tech Circuits">
                </div>
            </div>
        </section>

        <section>
            <h2>วิดีโอสาธิต</h2>
            <div class="video-container">
                <!-- Google Drive Video Embed (Placeholder Link) -->
                <!-- Note: To autoplay from Drive, we use the preview link format with autoplay=1 -->
                <iframe
                    src="https://drive.google.com/file/d/1QToMGPfU_ccNBc1GHwCbqtfpItdM7GTG/preview?autoplay=1&mute=1"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.875rem; text-align: center;">
                * วิดีโอจะเล่นอัตโนมัติแบบปิดเสียงตามนโยบายความเป็นส่วนตัวของเบราว์เซอร์
            </p>
        </section>
    </div>
</body>

</html>
